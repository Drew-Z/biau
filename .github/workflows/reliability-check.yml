name: Reliability Check

on:
  workflow_dispatch:
  schedule:
    - cron: '17 1 * * *'

jobs:
  reliability-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run reliability suite
        run: npm run reliability:check -- --strict

      - name: Upload status reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reliability-status
          path: public/status/*.json
          if-no-files-found: warn
