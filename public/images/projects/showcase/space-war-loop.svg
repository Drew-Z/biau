<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Space War playable loop diagram</title>
  <desc id="desc">A public-safe workflow diagram showing the Space War menu, playable scene, combat loop, result summary, and return path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="0.52" stop-color="#17243a"/>
      <stop offset="1" stop-color="#0d1f2a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24364f"/>
      <stop offset="1" stop-color="#172234"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8b84e"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <path d="M110 560 C240 500 300 620 440 552 C560 494 626 536 726 486 C870 414 970 438 1110 344" fill="none" stroke="#5eead4" stroke-width="2" stroke-opacity="0.22"/>
  <g fill="#f8fafc" opacity="0.34">
    <circle cx="166" cy="136" r="2.5"/>
    <circle cx="1012" cy="150" r="2.5"/>
    <circle cx="1118" cy="568" r="2.5"/>
    <circle cx="736" cy="112" r="2"/>
    <circle cx="340" cy="612" r="2"/>
  </g>
  <text x="96" y="94" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="800">Space War 试玩闭环</text>
  <text x="98" y="132" fill="#b6c7dd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Public showcase route, playable scene, combat loop, result summary, and return path.</text>
  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(92 236)">
      <rect width="184" height="142" rx="20" fill="url(#card)" stroke="#395471"/>
      <text x="24" y="44" fill="#f8b84e" font-size="18" font-weight="800">01</text>
      <text x="24" y="76" fill="#f8fafc" font-size="24" font-weight="800">Menu</text>
      <text x="24" y="106" fill="#a7b8cf" font-size="15">选择公开试玩入口</text>
    </g>
    <g transform="translate(338 236)">
      <rect width="184" height="142" rx="20" fill="url(#card)" stroke="#395471"/>
      <text x="24" y="44" fill="#f8b84e" font-size="18" font-weight="800">02</text>
      <text x="24" y="76" fill="#f8fafc" font-size="24" font-weight="800">Scene</text>
      <text x="24" y="106" fill="#a7b8cf" font-size="15">加载 Web 试玩场景</text>
    </g>
    <g transform="translate(584 236)">
      <rect width="184" height="142" rx="20" fill="url(#card)" stroke="#395471"/>
      <text x="24" y="44" fill="#f8b84e" font-size="18" font-weight="800">03</text>
      <text x="24" y="76" fill="#f8fafc" font-size="24" font-weight="800">Combat</text>
      <text x="24" y="106" fill="#a7b8cf" font-size="15">移动、射击、躲避</text>
    </g>
    <g transform="translate(830 236)">
      <rect width="184" height="142" rx="20" fill="url(#card)" stroke="#395471"/>
      <text x="24" y="44" fill="#f8b84e" font-size="18" font-weight="800">04</text>
      <text x="24" y="76" fill="#f8fafc" font-size="24" font-weight="800">Result</text>
      <text x="24" y="106" fill="#a7b8cf" font-size="15">查看本局结算</text>
    </g>
    <g transform="translate(1076 236)">
      <rect width="112" height="142" rx="20" fill="#203247" stroke="#395471"/>
      <text x="24" y="44" fill="#f8b84e" font-size="18" font-weight="800">05</text>
      <text x="24" y="76" fill="#f8fafc" font-size="22" font-weight="800">Back</text>
      <text x="24" y="106" fill="#a7b8cf" font-size="15">回到展示页</text>
    </g>
  </g>
  <g fill="none" stroke="#f8b84e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M286 307 H324"/>
    <path d="M532 307 H570"/>
    <path d="M778 307 H816"/>
    <path d="M1024 307 H1062"/>
  </g>
  <g transform="translate(166 486)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="948" height="74" rx="18" fill="#111c2d" stroke="#2c405a"/>
    <text x="28" y="32" fill="#f8fafc" font-size="18" font-weight="800">Evidence boundary</text>
    <text x="28" y="56" fill="#a7b8cf" font-size="15">This diagram explains the public playable loop only; it does not expose local build paths, analytics, accounts, or deployment secrets.</text>
  </g>
</svg>
