    <rect width="190" height="88" rx="22" fill="#2563eb"/><text x="72" y="54">战斗</text>
    <rect y="126" width="190" height="88" rx="22" fill="#f97316"/><text x="72" y="180">结果</text>
    <rect y="252" width="190" height="88" rx="22" fill="#ef4444"/><text x="50" y="306">复盘摘要</text>
  </g>
  <rect x="1150" y="280" width="154" height="300" rx="26" fill="#eef6ff" stroke="#bdd7ff" stroke-width="2"/>
