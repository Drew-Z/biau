<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Spacewar II public showcase loop</title>
  <desc id="desc">A public-safe workflow diagram showing how Spacewar II moves from Godot export to Playlab content, web trial, and BIAU Port links.</desc>
  <rect width="1280" height="720" rx="40" fill="#f6f9fb"/>
  <rect x="56" y="56" width="1168" height="608" rx="34" fill="#ffffff" stroke="#c8d7e1" stroke-width="2"/>
  <text x="96" y="126" fill="#13293d" font-family="Inter, Microsoft YaHei, sans-serif" font-size="40" font-weight="700">Spacewar II Public Showcase Loop</text>
  <text x="96" y="166" fill="#547086" font-family="Inter, Microsoft YaHei, sans-serif" font-size="22">Godot export, Playlab content model, public trial route, and BIAU Port entry stay separated and auditable.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#31556f"/>
    </marker>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef7fb"/>
      <stop offset="100%" stop-color="#f9fbef"/>
    </linearGradient>
  </defs>

  <g font-family="Inter, Microsoft YaHei, sans-serif">
    <rect x="104" y="242" width="230" height="142" rx="24" fill="url(#panel)" stroke="#91afc1" stroke-width="2"/>
    <text x="136" y="294" fill="#102033" font-size="28" font-weight="700">Godot Project</text>
    <text x="136" y="334" fill="#4b6477" font-size="20">Menu, combat, HUD</text>
    <text x="136" y="362" fill="#4b6477" font-size="20">result, smoke checks</text>

    <rect x="404" y="242" width="230" height="142" rx="24" fill="#f8fbff" stroke="#91afc1" stroke-width="2"/>
    <text x="436" y="294" fill="#102033" font-size="28" font-weight="700">Web Export</text>
    <text x="436" y="334" fill="#4b6477" font-size="20">Canvas render check</text>
    <text x="436" y="362" fill="#4b6477" font-size="20">desktop and mobile</text>

    <rect x="704" y="242" width="230" height="142" rx="24" fill="#fffaf0" stroke="#d3ad74" stroke-width="2"/>
    <text x="736" y="294" fill="#102033" font-size="28" font-weight="700">Playlab Entry</text>
    <text x="736" y="334" fill="#6c583d" font-size="20">Game detail, trial URL</text>
    <text x="736" y="362" fill="#6c583d" font-size="20">screenshots, dev log</text>

    <rect x="1004" y="242" width="170" height="142" rx="24" fill="#f3faf4" stroke="#86b891" stroke-width="2"/>
    <text x="1032" y="294" fill="#102033" font-size="28" font-weight="700">BIAU Port</text>
    <text x="1032" y="334" fill="#45644d" font-size="20">Project page</text>
    <text x="1032" y="362" fill="#45644d" font-size="20">status links</text>

    <path d="M340 313 H390" stroke="#31556f" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M640 313 H690" stroke="#31556f" stroke-width="4" marker-end="url(#arrow)" fill="none"/>
    <path d="M940 313 H990" stroke="#31556f" stroke-width="4" marker-end="url(#arrow)" fill="none"/>

    <rect x="182" y="480" width="916" height="94" rx="26" fill="#f7f9fb" stroke="#d7e2ea"/>
    <text x="222" y="526" fill="#102033" font-size="24" font-weight="700">Release gate stays explicit</text>
    <text x="222" y="558" fill="#587184" font-size="20">Screenshots and web trial can be shown; formal APK or store-style release still needs signed artifact, checksum, scan, regression evidence, and approval.</text>
  </g>
</svg>
