services:
  - type: web
    name: biau-public-assistant-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run assistant:index && npm run prisma:generate && npm run server:build
    startCommand: npm run server:start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ASSISTANT_SERVICE_MODE
        value: public
      - key: CORS_ORIGIN
        value: https://biau.playlab.eu.cc
      - key: ASSISTANT_MODEL_BASE_URL
        sync: false
      - key: ASSISTANT_MODEL_API_KEY
        sync: false
      - key: ASSISTANT_MODEL_NAME
        sync: false
      - key: ASSISTANT_MODEL_PROVIDER
        value: mimo-compatible
      - key: ASSISTANT_RAG_API_BASE_URL
        sync: false
      - key: ASSISTANT_RAG_API_KEY
        sync: false
      - key: ASSISTANT_RAG_TIMEOUT_MS
        value: "3000"
      - key: METRICS_ENABLED
        value: "false"

  - type: web
    name: biau-operator-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run assistant:index && npm run prisma:generate && npm run server:build
    startCommand: npm run prisma:migrate && npm run prisma:migrate:studio && npm run server:start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ASSISTANT_SERVICE_MODE
        value: operator
      - key: CORS_ORIGIN
        value: https://biau.playlab.eu.cc
      - key: DATABASE_URL
        sync: false
      - key: STUDIO_DATABASE_URL
        sync: false
      - key: OPERATOR_SERVICE_TOKEN
        sync: false
      - key: OPERATOR_OWNER_ID
        value: site-owner
      - key: OPERATOR_OWNER_EMAILS
        sync: false
      - key: OPERATOR_DISPLAY_NAME
        value: Site Owner
      - key: OPERATOR_MODEL_CHANNEL_ID
        sync: false
      - key: ASSISTANT_MODEL_BASE_URL
        sync: false
      - key: ASSISTANT_MODEL_API_KEY
        sync: false
      - key: ASSISTANT_MODEL_NAME
        sync: false
      - key: ASSISTANT_MODEL_PROVIDER
        value: mimo-compatible
      - key: ASSISTANT_MODEL_CHANNELS_JSON
        sync: false
      - key: ASSISTANT_RAG_API_BASE_URL
        sync: false
      - key: ASSISTANT_RAG_API_KEY
        sync: false
      - key: RAG_SYNC_TOKEN
        sync: false
      - key: ASSISTANT_RAG_TIMEOUT_MS
        value: "3000"
      - key: METRICS_ENABLED
        value: "false"

  - type: web
    name: biau-content-studio-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run prisma:generate && npm run server:build
    startCommand: npm run prisma:migrate:studio && npm run server:start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ASSISTANT_SERVICE_MODE
        value: studio
      - key: CORS_ORIGIN
        value: https://biau.playlab.eu.cc
      - key: TRUST_PROXY
        value: "true"
      - key: AI_DAILY_PUBLIC_CORS_ORIGINS
        value: https://biau.playlab.eu.cc
      - key: AI_DAILY_TIME_ZONE
        value: Asia/Shanghai
      - key: AI_DAILY_PUBLIC_FEED_ENABLED
        value: "false"
      - key: AI_DAILY_PUBLIC_WINDOW_HOURS
        value: "72"
      - key: AI_DAILY_PUBLIC_STALE_MINUTES
        value: "180"
      - key: AI_DAILY_PUBLIC_RATE_LIMIT
        value: "60"
      - key: AI_DAILY_PUBLIC_RATE_WINDOW_MS
        value: "60000"
      - key: AI_DAILY_MODEL_RUNTIME_JSON
        sync: false
      - key: AI_DAILY_MODEL_APPROVAL_FILE
        value: /etc/secrets/ai-daily-model-approval.v1.json
      - key: AI_DAILY_MODEL_APPROVAL_BUNDLE_HASH
        sync: false
      - key: AI_DAILY_BUSINESS_EVALUATION_ENABLED
        value: "false"
      - key: AI_DAILY_PRODUCTION_GENERATION_ENABLED
        value: "false"
      - key: STUDIO_DATABASE_URL
        sync: false
      - key: STUDIO_ADMIN_TOKEN
        sync: false
      - key: METRICS_ENABLED
        value: "false"
      - key: AI_DAILY_OPERATIONS_METRICS_ENABLED
        value: "false"

# AI Daily Cron jobs intentionally remain outside this Blueprint until the
# first live edition passes the human acceptance gate. When created manually,
# the Editorial Cron must receive its own copy of the approved Secret File plus
# the same runtime/path/hash variables; Render does not inherit them from Studio.

  - type: web
    name: biau-rag-orchestrator
    runtime: node
    plan: free
    buildCommand: npm ci && npm run assistant:index && npm run prisma:generate && npm run server:build
    startCommand: npm run server:start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ASSISTANT_SERVICE_MODE
        value: rag
      - key: RAG_STORE_PROVIDER
        value: qdrant
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_PUBLIC_COLLECTION
        value: biau_public_chunks
      - key: QDRANT_INTERNAL_COLLECTION
        value: biau_internal_chunks
      - key: RAG_DATABASE_URL
        sync: false
      - key: RAG_PUBLIC_API_KEY
        sync: false
      - key: RAG_INTERNAL_API_KEY
        sync: false
      - key: RAG_SYNC_TOKEN
        sync: false
      - key: EMBEDDING_BASE_URL
        sync: false
      - key: EMBEDDING_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        sync: false
      - key: EMBEDDING_DIMENSION
        value: "4096"
      - key: EMBEDDING_TIMEOUT_MS
        value: "20000"
      - key: RERANKER_BASE_URL
        sync: false
      - key: RERANKER_API_KEY
        sync: false
      - key: RERANKER_MODEL
        sync: false
      - key: METRICS_ENABLED
        value: "false"
